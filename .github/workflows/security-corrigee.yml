# TP 7 — Pipeline CI/CD CORRIGE

name: Security Pipeline (Corrige)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep SAST
        # --error : exit 1 si au moins un finding -> pipeline bloque
        run: semgrep --config=p/javascript --config=p/nodejs --config=p/security-audit --error .
        working-directory: ./app

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies (frozen)
        run: npm ci
        working-directory: ./app
      - name: Audit — block on High/Critical
        run: npm audit --audit-level=high
        working-directory: ./app

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Pipeline summary
    runs-on: ubuntu-latest
    needs: [sast, dependency-audit, secret-scan]
    if: always()
    steps:
      - name: Print results
        run: |
          echo "SAST:        ${{ needs.sast.result }}"
          echo "Deps audit:  ${{ needs.dependency-audit.result }}"
          echo "Secrets:     ${{ needs.secret-scan.result }}"
